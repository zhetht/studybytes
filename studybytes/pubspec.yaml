name: studybytes
description: StudyBytes - Plataforma de Estudio Social
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  flutter_bloc: ^8.1.3
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  google_generative_ai: ^0.4.3
  go_router: ^13.2.0
  intl: ^0.18.1
  equatable: ^2.0.5
  image_picker: ^1.0.5
  logger: ^2.0.0

  # Supabase 
  supabase_flutter: ^2.12.4

  # Para seleccionar archivos 
  file_picker: ^8.0.3

  # Para mostrar PDF
  flutter_pdfview: ^1.3.2
  # Para mostrar imágenes
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
